<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e3c72">
    <link rel="manifest" href="manifest.json">
    <title>Dprofer - Inventario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Estilos iguales a la versión anterior... */
        /* (Pon aquí todos los estilos que ya tenías) */
        
        /* Añade este estilo para el splash screen */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .splash img {
            width: 150px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* El resto de estilos aquí... */
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <div style="text-align: center;">
            <img id="splashLogo" src="icon-512.png" alt="Dprofer" style="width: 120px; border-radius: 30px;">
            <h2 style="color: white; margin-top: 20px;">Dprofer</h2>
            <p style="color: white;">Sistema de Inventario</p>
        </div>
    </div>

    <!-- Resto del contenido de tu sistema aquí -->
    <!-- (Todo el código HTML de tu sistema) -->

    <script>
        // Ocultar splash después de cargar
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if (splash) splash.style.display = 'none';
            }, 1500);
        });
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado', reg))
                .catch(err => console.log('Error:', err));
        }
        
        // Código de tu sistema aquí...
    </script>
</body>
</html>
